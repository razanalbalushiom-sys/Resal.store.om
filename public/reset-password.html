<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إعادة تعيين كلمة المرور</title>
<style>body{font-family:Tahoma,Arial;background:#06060f;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh}.card{background:#0d0d18;padding:24px;border-radius:12px;width:360px;text-align:right}label{display:block;margin-bottom:6px;color:#9d8ec4}input{width:100%;padding:10px;border-radius:8px;border:1px solid #2a2540;background:#0b0b12;color:#fff;margin-bottom:12px}button{background:#7c3aed;color:#fff;border:none;padding:10px 14px;border-radius:8px;cursor:pointer}</style></head><body>
<div class="card">
  <h2 style="margin-bottom:6px">إعادة تعيين كلمة المرور</h2>
  <p style="color:#9d8ec4;margin-bottom:12px">أدخل بريدك وكلمة المرور الجديدة.</p>
  <label>البريد الإلكتروني</label><input id="rpEmail" type="email"/>
  <label>الرمز (من الرابط)</label><input id="rpToken" />
  <label>كلمة المرور الجديدة</label><input id="rpPass" type="password"/>
  <button onclick="doReset()">إعادة التعيين</button>
  <div id="msg" style="margin-top:12px;color:#c4b5fd"></div>
</div>
<script>
async function doReset(){
  const email=document.getElementById('rpEmail').value.trim(); const token=document.getElementById('rpToken').value.trim(); const pass=document.getElementById('rpPass').value;
  if(!email||!token||!pass){document.getElementById('msg').textContent='يرجى تعبئة الحقول';return}
  const res=await fetch('/api/password-reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,token,password:pass})});
  const j=await res.json(); if(j.ok){document.getElementById('msg').textContent='تم إعادة تعيين كلمة المرور. يمكنك الآن تسجيل الدخول.';} else {document.getElementById('msg').textContent='فشل: '+(j.error||'');}
}
</script>
</body></html>
